<!DOCTYPE html><html lang="en">
<head>
<meta charset="utf-8"><script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script><link
href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css"
rel="stylesheet"><style>
html, body, #cesiumContainer {
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
}
</style></head><body><div id="cesiumContainer"></div><script>

Cesium.Ion.defaultAccessToken =
"YOUR_CESIUM_TOKEN";

const viewer = new Cesium.Viewer(
    'cesiumContainer',
    {
        animation:true,
        timeline:true,
        terrain:Cesium.Terrain.fromWorldTerrain()
    }
);

viewer.camera.flyHome(3);

</script></body>
</html>
